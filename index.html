<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Medical Scriber</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap');

        :root {
            --bg-primary: #F7F3E2;
            --bg-surface: #EDE9D5;
            --bg-card: #E8E3CC;
            --border: #D4CDB0;
            --accent-purple-deep: #5D0252;
            --accent-gold: #FFB411;
            --accent-green: #052E28;
            --accent-orange: #FF7017;
            --accent-error: #A6341A;
            --text-primary: #1A1A1A;
            --text-secondary: #4A3F35;
            --text-muted: #8C7E6E;
            --text-on-dark: #F7F3E2;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--text-primary);
            color: var(--text-on-dark);
            padding: 20px 24px;
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        header .brand-name {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 1.7rem;
            letter-spacing: 0.01em;
        }

        header .brand-subtitle {
            font-family: 'DM Mono', 'Courier New', monospace;
            font-size: 0.6875rem;
            font-variant: small-caps;
            letter-spacing: 0.12em;
            color: rgba(247, 243, 226, 0.55);
        }

        main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 36px 16px 40px;
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 24px rgba(26, 26, 26, 0.08);
        }

        .card-heading {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 24px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        /* --- Inputs --- */
        .field-label {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .text-input {
            width: 100%;
            padding: 15px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            color: var(--text-primary);
            background: var(--bg-primary);
            transition: border-color 0.18s, box-shadow 0.18s;
            -webkit-appearance: none;
        }

        .text-input:focus {
            border-color: var(--accent-purple-deep);
            box-shadow: 0 0 0 3px rgba(93, 2, 82, 0.15);
        }

        .text-input::placeholder { color: var(--text-muted); }
        .text-input.error { border-color: var(--accent-error); }

        .field-error {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            color: var(--accent-error);
            margin-top: 5px;
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* --- Record area --- */
        .record-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .record-btn {
            width: 100%;
            border: none;
            border-radius: 9999px;
            padding: 14px 32px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: background 0.18s, transform 0.12s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .record-btn:active:not(:disabled) { transform: scale(0.98); }
        .record-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .record-btn.start {
            background: var(--accent-purple-deep);
            color: var(--text-on-dark);
        }

        .record-btn.start:hover:not(:disabled) {
            background: var(--accent-green);
        }

        .record-btn.stop {
            background: var(--accent-orange);
            color: var(--text-on-dark);
        }

        /* --- Recording state --- */
        .recording-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 99px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-orange);
            border-radius: 50%;
            animation: pulse 1.3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.75); }
        }

        .recording-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-orange);
            letter-spacing: 0.08em;
        }

        .timer {
            font-family: 'DM Mono', 'Courier New', monospace;
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.06em;
            font-variant-numeric: tabular-nums;
        }

        .patient-chip {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
        }

        .patient-chip strong { color: var(--text-primary); }

        /* --- Spinner --- */
        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 24px 0;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-purple-deep);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        .spinner.amber { border-top-color: var(--accent-gold); }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
        }

        .status-sub {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        /* --- Icon circles --- */
        .icon-circle {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
        }

        .icon-circle.green { background: rgba(5, 46, 40, 0.12); }
        .icon-circle.red   { background: rgba(166, 52, 26, 0.12); }
        .icon-circle.amber { background: rgba(255, 180, 17, 0.18); }

        /* --- Action buttons --- */
        .action-btn {
            width: 100%;
            padding: 15px 20px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.15s, background 0.18s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .action-btn:active { transform: scale(0.97); }

        .action-btn.primary   { background: var(--accent-purple-deep); color: var(--text-on-dark); }
        .action-btn.primary:hover { background: var(--accent-green); }
        .action-btn.danger    { background: var(--accent-error); color: var(--text-on-dark); }
        .action-btn.ghost     { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        /* --- Divider --- */
        hr.divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 16px 20px 24px;
            font-family: 'DM Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<header>
    <span class="brand-name">Fayha</span>
    <span class="brand-subtitle">AI Clinical Scriber</span>
</header>

<main>
    <div class="card" id="card"></div>
</main>

<footer>
    Audio is streamed directly for transcription and is never stored on this device or on Fayha servers.
</footer>

<script>
    // Change this to Railway URL when deployed
    const BACKEND_URL = 'https://ai-scriber-backend-production.up.railway.app';

    let appState   = 'READY';
    let mediaRecorder   = null;
    let audioChunks     = [];
    let audioBlob       = null;
    let timerInterval   = null;
    let recordingSeconds = 0;
    let firstName       = '';
    let lastName        = '';
    let dateOfBirth     = '';
    let retryAttempt    = 0;
    let errorMessage    = '';

    const card = document.getElementById('card');

    // ─── Utilities ────────────────────────────────────────────────────────────

    function fmt(secs) {
        const m = Math.floor(secs / 60).toString().padStart(2, '0');
        const s = (secs % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function wait(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    function getSupportedMimeType() {
        const candidates = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/ogg;codecs=opus',
            'audio/mp4',
        ];
        for (const type of candidates) {
            if (MediaRecorder.isTypeSupported(type)) return type;
        }
        return '';
    }

    // ─── State machine ────────────────────────────────────────────────────────

    function setState(next) {
        console.log(`[Scriber] ${appState} → ${next}`);
        appState = next;
        render();
    }

    function render() {
        switch (appState) {
            case 'READY':      renderReady();      break;
            case 'RECORDING':  renderRecording();  break;
            case 'PROCESSING': renderProcessing(); break;
            case 'RETRYING':   renderRetrying();   break;
            case 'SUCCESS':    renderSuccess();    break;
            case 'ERROR':      renderError();      break;
        }
    }

    // ─── Renderers ────────────────────────────────────────────────────────────

    function renderReady() {
        card.innerHTML = `
            <h2 class="card-heading">Start a Consultation</h2>
            <div class="name-row">
                <div>
                    <label class="field-label" for="fname">First Name</label>
                    <input class="text-input" id="fname" type="text"
                        placeholder="e.g. Jane"
                        autocomplete="given-name"
                        value="${firstName.replace(/"/g, '&quot;')}" />
                </div>
                <div>
                    <label class="field-label" for="lname">Last Name</label>
                    <input class="text-input" id="lname" type="text"
                        placeholder="e.g. Smith"
                        autocomplete="family-name"
                        value="${lastName.replace(/"/g, '&quot;')}" />
                </div>
            </div>
            <div class="input-group">
                <label class="field-label" for="dob">Date of Birth</label>
                <input class="text-input" id="dob" type="date"
                    value="${dateOfBirth}" />
                <p class="field-error" id="fields-err">Please fill in all patient fields before recording.</p>
            </div>
            <div class="record-area">
                <button class="record-btn start" id="startBtn" onclick="startRecording()">START RECORDING</button>
            </div>
        `;
        document.getElementById('fname').addEventListener('input', e => { firstName = e.target.value; });
        document.getElementById('lname').addEventListener('input', e => { lastName = e.target.value; });
        document.getElementById('dob').addEventListener('input', e => { dateOfBirth = e.target.value; });
    }

    function renderRecording() {
        card.innerHTML = `
            <div class="record-area">
                <div class="recording-badge">
                    <div class="pulse-dot"></div>
                    <span class="recording-label">RECORDING</span>
                </div>
                <div class="timer" id="timer">${fmt(recordingSeconds)}</div>
                <button class="record-btn stop" onclick="stopRecording()">STOP RECORDING</button>
                <p class="patient-chip">Patient: <strong>${firstName} ${lastName}</strong></p>
            </div>
        `;
    }

    function renderProcessing() {
        card.innerHTML = `
            <div class="spinner-wrap">
                <div class="spinner"></div>
                <p class="status-title">Sending for transcription&hellip;</p>
                <p class="status-sub">Please keep this page open.</p>
            </div>
        `;
    }

    function renderRetrying() {
        card.innerHTML = `
            <div class="spinner-wrap">
                <div class="spinner amber"></div>
                <p class="status-title">Retrying&hellip; (attempt ${retryAttempt} of 3)</p>
                <p class="status-sub">Connection issue &mdash; staying on this page to preserve your recording.</p>
            </div>
        `;
    }

    function renderSuccess() {
        card.innerHTML = `
            <div class="record-area" style="gap:20px; padding: 8px 0;">
                <div class="icon-circle green">&#x2705;</div>
                <p class="status-title" style="color:var(--accent-green);">Upload Successful!</p>
                <p class="status-sub">Note will appear in Google Sheets shortly.</p>
                <hr class="divider" style="width:100%;">
                <div class="btn-stack">
                    <button class="action-btn primary" onclick="startNew()">Start New Recording</button>
                </div>
            </div>
        `;
    }

    function renderError() {
        const canRetry = !!audioBlob;
        card.innerHTML = `
            <div class="record-area" style="gap:18px; padding: 8px 0;">
                <div class="icon-circle red">&#x274C;</div>
                <p class="status-title" style="color:var(--accent-error);">Upload Failed</p>
                <p class="status-sub">${errorMessage}</p>
                <hr class="divider" style="width:100%;">
                <div class="btn-stack">
                    ${canRetry ? `<button class="action-btn danger" onclick="retryUpload()">Try Again</button>` : ''}
                    <button class="action-btn ghost" onclick="startNew()">Start New Recording</button>
                </div>
            </div>
        `;
    }

    // ─── Recording logic ──────────────────────────────────────────────────────

    async function startRecording() {
        firstName   = (document.getElementById('fname')?.value || firstName).trim();
        lastName    = (document.getElementById('lname')?.value || lastName).trim();
        dateOfBirth = (document.getElementById('dob')?.value  || dateOfBirth).trim();

        if (!firstName || !lastName || !dateOfBirth) {
            const err = document.getElementById('fields-err');
            if (err) err.style.display = 'block';
            if (!firstName) document.getElementById('fname')?.classList.add('error');
            if (!lastName)  document.getElementById('lname')?.classList.add('error');
            if (!dateOfBirth) document.getElementById('dob')?.classList.add('error');
            return;
        }

        console.log('[Scriber] Requesting microphone for patient:', firstName, lastName, dateOfBirth);

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('[Scriber] Microphone access granted');

            audioChunks = [];
            audioBlob   = null;
            recordingSeconds = 0;

            const mimeType = getSupportedMimeType();
            console.log('[Scriber] MIME type selected:', mimeType || '(browser default)');

            mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});

            mediaRecorder.ondataavailable = e => {
                if (e.data && e.data.size > 0) {
                    audioChunks.push(e.data);
                    console.log('[Scriber] Chunk received, bytes:', e.data.size);
                }
            };

            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(t => t.stop());
                const blobType = mimeType || 'audio/webm';
                audioBlob = new Blob(audioChunks, { type: blobType });
                console.log('[Scriber] Blob created — size:', audioBlob.size, 'type:', audioBlob.type);
                sendToBackend(1);
            };

            mediaRecorder.start(1000);
            setState('RECORDING');

            timerInterval = setInterval(() => {
                recordingSeconds++;
                const el = document.getElementById('timer');
                if (el) el.textContent = fmt(recordingSeconds);
            }, 1000);

        } catch (err) {
            console.error('[Scriber] getUserMedia error:', err.name, err.message);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                errorMessage = 'Microphone access was denied. Please tap the lock icon in your browser\'s address bar, allow microphone access, then reload the page.';
            } else if (err.name === 'NotFoundError') {
                errorMessage = 'No microphone found on this device.';
            } else {
                errorMessage = `Could not start recording: ${err.message}`;
            }
            setState('ERROR');
        }
    }

    function stopRecording() {
        console.log('[Scriber] Stop button tapped — recording duration:', fmt(recordingSeconds));
        clearInterval(timerInterval);
        setState('PROCESSING');
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
    }

    // ─── Upload + retry ───────────────────────────────────────────────────────

    async function sendToBackend(attempt) {
        console.log(`[Scriber] Upload attempt ${attempt} — blob: ${audioBlob?.size} bytes`);

        const formData = new FormData();
        formData.append('audio', audioBlob, 'recording.webm');
        formData.append('firstName', firstName);
        formData.append('lastName', lastName);
        formData.append('dateOfBirth', dateOfBirth);

        try {
            const res = await fetch(`${BACKEND_URL}/upload`, {
                method: 'POST',
                body: formData,
            });

            console.log('[Scriber] HTTP status:', res.status);

            if (!res.ok) {
                const body = await res.text().catch(() => '');
                throw new Error(`Server returned ${res.status}${body ? ': ' + body : ''}`);
            }

            const data = await res.json();
            console.log('[Scriber] Success response:', data);

            audioBlob   = null;
            audioChunks = [];
            setState('SUCCESS');

        } catch (err) {
            console.error(`[Scriber] Attempt ${attempt} failed:`, err.message);

            const delays = [2000, 4000, 8000];

            if (attempt <= 3) {
                retryAttempt = attempt;
                setState('RETRYING');
                const delay = delays[attempt - 1];
                console.log(`[Scriber] Waiting ${delay / 1000}s before retry ${attempt}…`);
                await wait(delay);
                await sendToBackend(attempt + 1);
            } else {
                console.error('[Scriber] All 3 retries exhausted.');
                errorMessage = 'Connection failed after 3 attempts. Please check your internet connection and tap Try Again when ready.';
                setState('ERROR');
            }
        }
    }

    async function retryUpload() {
        if (!audioBlob) {
            errorMessage = 'Recording was lost — please record again.';
            setState('ERROR');
            return;
        }
        console.log('[Scriber] Manual retry — reusing existing audio blob');
        setState('PROCESSING');
        await sendToBackend(1);
    }

    function startNew() {
        console.log('[Scriber] Starting new session — clearing audio blob');
        audioBlob        = null;
        audioChunks      = [];
        firstName        = '';
        lastName         = '';
        dateOfBirth      = '';
        recordingSeconds = 0;
        retryAttempt     = 0;
        errorMessage     = '';
        clearInterval(timerInterval);
        setState('READY');
    }

    // Boot
    render();
</script>
</body>
</html>
