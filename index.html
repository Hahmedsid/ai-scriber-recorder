<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI Medical Scriber</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap');

        :root {
            --bg-primary: #F7F3E2;
            --bg-surface: #EDE9D5;
            --bg-card: #E8E3CC;
            --border: #D4CDB0;
            --accent-purple-deep: #5D0252;
            --accent-gold: #FFB411;
            --accent-green: #052E28;
            --accent-orange: #FF7017;
            --accent-error: #A6341A;
            --text-primary: #1A1A1A;
            --text-secondary: #4A3F35;
            --text-muted: #8C7E6E;
            --text-on-dark: #F7F3E2;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--text-primary);
            color: var(--text-on-dark);
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .brand-logo {
            width: 80px;
            height: auto;
            display: block;
        }

        header .brand-subtitle {
            font-family: 'DM Mono', 'Courier New', monospace;
            font-size: 0.6875rem;
            font-variant: small-caps;
            letter-spacing: 0.12em;
            color: rgba(247, 243, 226, 0.55);
        }

        main {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 36px 16px 40px;
        }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 36px 28px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 24px rgba(26, 26, 26, 0.08);
        }

        .card-heading {
            font-family: 'Instrument Serif', Georgia, serif;
            font-size: 24px;
            font-weight: 400;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        /* --- Inputs --- */
        .field-label {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .text-input {
            width: 100%;
            padding: 15px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            color: var(--text-primary);
            background: var(--bg-primary);
            transition: border-color 0.18s, box-shadow 0.18s;
            -webkit-appearance: none;
        }

        .text-input:focus {
            border-color: var(--accent-purple-deep);
            box-shadow: 0 0 0 3px rgba(93, 2, 82, 0.15);
        }

        .text-input::placeholder { color: var(--text-muted); }
        .text-input.error { border-color: var(--accent-error); }

        .field-error {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            color: var(--accent-error);
            margin-top: 5px;
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .name-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* --- Record area --- */
        .record-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .record-btn {
            width: 100%;
            border: none;
            border-radius: 9999px;
            padding: 14px 32px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: background 0.18s, transform 0.12s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
        }

        .record-btn:active:not(:disabled) { transform: scale(0.98); }
        .record-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        .record-btn.start {
            background: var(--accent-purple-deep);
            color: var(--text-on-dark);
        }

        .record-btn.start:hover:not(:disabled) {
            background: var(--accent-green);
        }

        .record-btn.stop {
            background: var(--accent-orange);
            color: var(--text-on-dark);
        }

        .record-btn.pause {
            background: var(--accent-gold);
            color: var(--text-primary);
        }

        .record-btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .record-btn-row .record-btn {
            flex: 1;
        }

        /* --- Recording state --- */
        .recording-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 99px;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            background: var(--accent-orange);
            border-radius: 50%;
            animation: pulse 1.3s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.35; transform: scale(0.75); }
        }

        .recording-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-orange);
            letter-spacing: 0.08em;
        }

        .timer {
            font-family: 'DM Mono', 'Courier New', monospace;
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.06em;
            font-variant-numeric: tabular-nums;
        }

        .patient-chip {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-align: center;
        }

        .patient-chip strong { color: var(--text-primary); }

        /* --- Spinner --- */
        .spinner-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 24px 0;
        }

        .spinner {
            width: 52px;
            height: 52px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-purple-deep);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        .spinner.amber { border-top-color: var(--accent-gold); }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
        }

        .status-sub {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8125rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.5;
        }

        /* --- Icon circles --- */
        .icon-circle {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
        }

        .icon-circle.green { background: rgba(5, 46, 40, 0.12); }
        .icon-circle.red   { background: rgba(166, 52, 26, 0.12); }
        .icon-circle.amber { background: rgba(255, 180, 17, 0.18); }

        /* --- Action buttons --- */
        .action-btn {
            width: 100%;
            padding: 15px 20px;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9375rem;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.15s, background 0.18s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .action-btn:active { transform: scale(0.97); }

        .action-btn.primary   { background: var(--accent-purple-deep); color: var(--text-on-dark); }
        .action-btn.primary:hover { background: var(--accent-green); }
        .action-btn.danger    { background: var(--accent-error); color: var(--text-on-dark); }
        .action-btn.ghost     { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }

        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        /* --- Divider --- */
        hr.divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 16px 20px 24px;
            font-family: 'DM Mono', 'Courier New', monospace;
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

<header>
    <svg class="brand-logo" viewBox="0 0 1590.4 643.2" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fayha">
        <g fill="#F7F3E2">
            <path d="M310.400 192.800L202.880 192.800L202.880 416.800L220.480 416.800L220.480 303.840L307.200 303.840L307.200 287.200L220.480 287.200L220.480 209.440L310.400 209.440L310.400 192.800Z M434.240 341.600L530.560 341.600L561.600 416.800L581.440 416.800L482.560 184.160L383.680 416.800L403.520 416.800L434.240 341.600ZM441.280 324.960L482.560 224.800L523.840 324.960L441.280 324.960Z"></path>
            <path d="M1132.800 192.800L1114.880 192.800L1114.880 286.560L984.000 286.560L984.000 192.800L966.400 192.800L966.400 416.800L984.000 416.800L984.000 303.200L1114.880 303.200L1114.880 416.800L1132.800 416.800L1132.800 192.800Z M1264.320 341.600L1360.640 341.600L1391.680 416.800L1411.520 416.800L1312.640 184.160L1213.760 416.800L1233.600 416.800L1264.320 341.600ZM1271.360 324.960L1312.640 224.800L1353.920 324.960L1271.360 324.960Z"></path>
        </g>
        <g transform="translate(686.72 176) scale(2.8)" stroke="#F7F3E2" stroke-width="4" fill="none" stroke-linecap="round">
            <path d="M 11 12 C 11 36, 36 30, 36 53"></path>
            <path d="M 61 12 C 61 36, 36 30, 36 53"></path>
            <path d="M 36 53 L 36 76"></path>
            <circle cx="11" cy="12" r="2.8" fill="#F7F3E2" stroke="none"></circle>
            <circle cx="61" cy="12" r="2.8" fill="#F7F3E2" stroke="none"></circle>
            <circle cx="36" cy="87" r="11"></circle>
        </g>
    </svg>
    <span class="brand-subtitle">Built for Physicians by Physicians</span>
</header>

<main>
    <div class="card" id="card"></div>
</main>

<footer>
    Audio is streamed directly for transcription and is never stored on this device or on Fayha servers.
</footer>

<script>
    const BACKEND_URL = 'https://ai-scriber-backend-production.up.railway.app';

    // ─── State ────────────────────────────────────────────────────────────────────
    let appState         = 'READY';
    let mediaRecorder    = null;
    let stream           = null;
    let currentMimeType  = '';
    let audioChunks      = [];
    // Each entry: {blob, mimeType, startSecond, endSecond, index}
    // Never concatenated — sent to server individually so each is a valid container.
    let segments         = [];
    let timerInterval    = null;
    let recordingSeconds = 0;
    let firstName        = '';
    let lastName         = '';
    let dateOfBirth      = '';
    let retryAttempt     = 0;
    let errorMessage     = '';
    // Each entry: {reason, at, secondsElapsed, resumedAt?}
    // resumedAt is added by resumeRecording() before the next segment starts.
    let interruptions    = [];
    let interruptReason  = '';

    const card = document.getElementById('card');

    // ─── Utilities ────────────────────────────────────────────────────────────────

    function fmt(secs) {
        const m = Math.floor(secs / 60).toString().padStart(2, '0');
        const s = (secs % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function wait(ms) {
        return new Promise(r => setTimeout(r, ms));
    }

    function getSupportedMimeType() {
        const candidates = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/ogg;codecs=opus',
            'audio/mp4',
        ];
        for (const type of candidates) {
            if (MediaRecorder.isTypeSupported(type)) return type;
        }
        return '';
    }

    // ─── State machine ────────────────────────────────────────────────────────────

    function setState(next) {
        console.log(`[Scriber] ${appState} → ${next}`);
        appState = next;
        render();
    }

    function render() {
        switch (appState) {
            case 'READY':        renderReady();        break;
            case 'RECORDING':    renderRecording();    break;
            case 'INTERRUPTED':  renderInterrupted();  break;
            case 'PROCESSING':   renderProcessing();   break;
            case 'RETRYING':     renderRetrying();     break;
            case 'SUCCESS':      renderSuccess();      break;
            case 'ERROR':        renderError();        break;
        }
    }

    // ─── Renderers ────────────────────────────────────────────────────────────────

    function renderReady() {
        card.innerHTML = `
            <h2 class="card-heading">Start a Consultation</h2>
            <div class="name-row">
                <div>
                    <label class="field-label" for="fname">First Name</label>
                    <input class="text-input" id="fname" type="text"
                        placeholder="e.g. Jane"
                        autocomplete="given-name"
                        value="${firstName.replace(/"/g, '&quot;')}" />
                </div>
                <div>
                    <label class="field-label" for="lname">Last Name</label>
                    <input class="text-input" id="lname" type="text"
                        placeholder="e.g. Smith"
                        autocomplete="family-name"
                        value="${lastName.replace(/"/g, '&quot;')}" />
                </div>
            </div>
            <div class="input-group">
                <label class="field-label" for="dob">Date of Birth</label>
                <input class="text-input" id="dob" type="date"
                    value="${dateOfBirth}" />
                <p class="field-error" id="fields-err">Please fill in all patient fields before recording.</p>
            </div>
            <div class="record-area">
                <button class="record-btn start" id="startBtn" onclick="startRecording()">START RECORDING</button>
            </div>
        `;
        document.getElementById('fname').addEventListener('input', e => { firstName = e.target.value; });
        document.getElementById('lname').addEventListener('input', e => { lastName = e.target.value; });
        document.getElementById('dob').addEventListener('input', e => { dateOfBirth = e.target.value; });
    }

    function renderRecording() {
        card.innerHTML = `
            <div class="record-area">
                <div class="recording-badge">
                    <div class="pulse-dot"></div>
                    <span class="recording-label">RECORDING</span>
                </div>
                <div class="timer" id="timer">${fmt(recordingSeconds)}</div>
                <div class="record-btn-row">
                    <button class="record-btn pause" onclick="pauseRecording()">PAUSE</button>
                    <button class="record-btn stop" onclick="stopRecording()">STOP RECORDING</button>
                </div>
                <p class="patient-chip">Patient: <strong>${firstName} ${lastName}</strong></p>
            </div>
        `;
    }

    function renderInterrupted() {
        const reasonText = ({
            'manual-pause':   'Recording paused by physician.',
            'call-or-mute':   'Possible incoming call or system audio interruption.',
            'track-ended':    'Microphone was taken by another app.',
            'recorder-error': 'A recording error occurred.',
            'page-hidden':    'App was backgrounded during recording.',
        })[interruptReason] || 'Audio interruption detected.';

        card.innerHTML = `
            <div class="record-area" style="gap:20px; padding:8px 0;">
                <div class="icon-circle amber">&#x26A0;</div>
                <p class="status-title" style="color:var(--accent-gold);">Recording Paused</p>
                <p class="status-sub">${reasonText}<br><strong>${fmt(recordingSeconds)}</strong> of audio is preserved.</p>
                <p class="status-sub" id="interruption-hint" style="font-style:italic;">
                    Tap Resume to re-acquire the mic and continue.
                </p>
                <hr class="divider" style="width:100%;">
                <div class="btn-stack">
                    <button class="action-btn primary" onclick="resumeRecording()">Resume Recording</button>
                    <button class="action-btn danger"  onclick="finishAndUpload()">Stop &amp; Upload Captured Audio</button>
                    <button class="action-btn ghost"   onclick="startNew()">Discard &amp; Start Over</button>
                </div>
            </div>
        `;
    }

    function renderProcessing() {
        card.innerHTML = `
            <div class="spinner-wrap">
                <div class="spinner"></div>
                <p class="status-title">Sending for transcription&hellip;</p>
                <p class="status-sub">Please keep this page open.</p>
            </div>
        `;
    }

    function renderRetrying() {
        card.innerHTML = `
            <div class="spinner-wrap">
                <div class="spinner amber"></div>
                <p class="status-title">Retrying&hellip; (attempt ${retryAttempt} of 3)</p>
                <p class="status-sub">Connection issue &mdash; staying on this page to preserve your recording.</p>
            </div>
        `;
    }

    function renderSuccess() {
        card.innerHTML = `
            <div class="record-area" style="gap:20px; padding: 8px 0;">
                <div class="icon-circle green">&#x2705;</div>
                <p class="status-title" style="color:var(--accent-green);">Upload Successful!</p>
                <p class="status-sub">Note will appear in Google Sheets shortly.</p>
                <hr class="divider" style="width:100%;">
                <div class="btn-stack">
                    <button class="action-btn primary" onclick="startNew()">Start New Recording</button>
                </div>
            </div>
        `;
    }

    function renderError() {
        const canRetry = segments.length > 0;
        card.innerHTML = `
            <div class="record-area" style="gap:18px; padding: 8px 0;">
                <div class="icon-circle red">&#x274C;</div>
                <p class="status-title" style="color:var(--accent-error);">Upload Failed</p>
                <p class="status-sub">${errorMessage}</p>
                <hr class="divider" style="width:100%;">
                <div class="btn-stack">
                    ${canRetry ? `<button class="action-btn danger" onclick="retryUpload()">Try Again</button>` : ''}
                    <button class="action-btn ghost" onclick="startNew()">Start New Recording</button>
                </div>
            </div>
        `;
    }

    // ─── Interruption detection ───────────────────────────────────────────────────
    // Named functions so they can be removed from tracks on cleanup.

    function onTrackMute() {
        if (appState === 'RECORDING') {
            console.warn('[Scriber] INTERRUPTION: audio track muted — possible incoming call');
            handleInterruption('call-or-mute');
        }
    }

    function onTrackUnmute() {
        console.log('[Scriber] Audio track unmuted — mic is available again');
        if (appState === 'INTERRUPTED') {
            const hint = document.getElementById('interruption-hint');
            if (hint) hint.textContent = 'Mic is available again — tap Resume to continue.';
        }
    }

    function onTrackEnded() {
        console.warn('[Scriber] INTERRUPTION: audio track ended — track is dead, will re-acquire on resume');
        if (appState === 'RECORDING') handleInterruption('track-ended');
    }

    function onVisibilityChange() {
        if (document.visibilityState === 'hidden') {
            console.log('[Scriber] Page hidden during recording — monitoring track state');
            return;
        }
        // Page became visible again — check if track silently died while hidden
        if (appState === 'RECORDING' && stream) {
            const tracks = stream.getAudioTracks();
            const anyEnded = tracks.some(t => t.readyState === 'ended');
            const anyMuted = tracks.some(t => t.muted);
            console.log('[Scriber] Page visible — track health:',
                tracks.map(t => `${t.readyState}/${t.muted ? 'muted' : 'live'}`).join(', '));
            if (anyEnded)      handleInterruption('track-ended');
            else if (anyMuted) handleInterruption('call-or-mute');
        }
    }

    function onPageHide() {
        // Flush the current 1-second buffer on page-hide so we don't lose buffered audio
        if (appState === 'RECORDING' && mediaRecorder && mediaRecorder.state === 'recording') {
            console.warn('[Scriber] pagehide — flushing recorder buffer');
            try { mediaRecorder.requestData(); } catch(e) { /* not available on all browsers */ }
        }
    }

    function handleInterruption(reason) {
        if (appState !== 'RECORDING') return;  // debounce multiple simultaneous signals

        console.warn(`[Scriber] INTERRUPTION: ${reason} at ${fmt(recordingSeconds)}`);
        interruptions.push({ reason, at: new Date().toISOString(), secondsElapsed: recordingSeconds });
        interruptReason = reason;

        clearInterval(timerInterval);
        timerInterval = null;

        // Flush any buffered audio before stopping so the last partial second isn't lost
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            try { mediaRecorder.requestData(); } catch(e) { /* not available on all browsers */ }
        }

        // Transition state BEFORE calling stop() so onstop sees INTERRUPTED (not RECORDING)
        // and knows not to trigger upload yet.
        setState('INTERRUPTED');

        if (mediaRecorder && (mediaRecorder.state === 'recording' || mediaRecorder.state === 'paused')) {
            mediaRecorder.stop();
        }
    }

    function cleanupPageListeners() {
        document.removeEventListener('visibilitychange', onVisibilityChange);
        window.removeEventListener('pagehide', onPageHide);
    }

    // ─── Recorder setup (shared by startRecording and resumeRecording) ────────────

    function setupRecorder(newStream, startSecond) {
        // Capture the MIME type now so onstop uses the right type even if currentMimeType
        // were to change (defensive; in practice it doesn't change within a session).
        const segMimeType = currentMimeType || 'audio/webm';

        audioChunks = [];
        mediaRecorder = new MediaRecorder(newStream, currentMimeType ? { mimeType: currentMimeType } : {});

        mediaRecorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) {
                audioChunks.push(e.data);
                console.log('[Scriber] Chunk received, bytes:', e.data.size,
                            'total chunks this segment:', audioChunks.length);
            }
        };

        mediaRecorder.onerror = (e) => {
            console.error('[Scriber] INTERRUPTION: MediaRecorder error —', e.error?.message || e);
            handleInterruption('recorder-error');
        };

        // Each recorder instance closes over its own newStream and startSecond so cleanup
        // and metadata are always correct even if mediaRecorder is replaced on resume.
        mediaRecorder.onstop = () => {
            newStream.getTracks().forEach(t => {
                t.removeEventListener('mute',   onTrackMute);
                t.removeEventListener('unmute', onTrackUnmute);
                t.removeEventListener('ended',  onTrackEnded);
                t.stop();
            });

            // Build ONE valid audio container for this segment.
            // Never concatenate with other segments — each platform's container format
            // (MP4 on iOS, WebM elsewhere) is only valid as a standalone file.
            const seg = new Blob(audioChunks, { type: segMimeType });
            const segIndex = segments.length;
            console.log('[Scriber] Segment', segIndex, '—', seg.size, 'bytes,',
                        'mime:', segMimeType,
                        'range:', startSecond + 's–' + recordingSeconds + 's,',
                        'appState:', appState);

            if (seg.size > 0) {
                segments.push({
                    blob:        seg,
                    mimeType:    segMimeType,
                    startSecond: startSecond,
                    endSecond:   recordingSeconds,
                    index:       segIndex,
                });
            }
            audioChunks = [];

            if (appState === 'PROCESSING') {
                // Normal user-initiated stop — all segments ready, send to server
                sendAllSegments(1);
            }
            // If INTERRUPTED: wait for user to choose Resume / Stop+Upload / Discard
        };

        newStream.getAudioTracks().forEach(t => {
            console.log('[Scriber] Track attached — readyState:', t.readyState, 'muted:', t.muted);
            t.addEventListener('mute',   onTrackMute);
            t.addEventListener('unmute', onTrackUnmute);
            t.addEventListener('ended',  onTrackEnded);
        });

        mediaRecorder.start(1000);
        console.log('[Scriber] MediaRecorder started (1s timeslice)',
                    'actual mimeType:', mediaRecorder.mimeType,
                    'startSecond:', startSecond);
    }

    // ─── Recording logic ──────────────────────────────────────────────────────────

    async function startRecording() {
        firstName   = (document.getElementById('fname')?.value || firstName).trim();
        lastName    = (document.getElementById('lname')?.value || lastName).trim();
        dateOfBirth = (document.getElementById('dob')?.value  || dateOfBirth).trim();

        if (!firstName || !lastName || !dateOfBirth) {
            const err = document.getElementById('fields-err');
            if (err) err.style.display = 'block';
            if (!firstName)   document.getElementById('fname')?.classList.add('error');
            if (!lastName)    document.getElementById('lname')?.classList.add('error');
            if (!dateOfBirth) document.getElementById('dob')?.classList.add('error');
            return;
        }

        console.log('[Scriber] Requesting microphone for:', firstName, lastName, dateOfBirth);

        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('[Scriber] Microphone access granted');

            audioChunks      = [];
            segments         = [];
            interruptions    = [];
            interruptReason  = '';
            recordingSeconds = 0;
            currentMimeType  = getSupportedMimeType();

            console.log('[Scriber] MIME type selected:', currentMimeType || '(browser default)');

            setupRecorder(stream, 0);
            setState('RECORDING');

            document.addEventListener('visibilitychange', onVisibilityChange);
            window.addEventListener('pagehide', onPageHide);

            timerInterval = setInterval(() => {
                recordingSeconds++;
                const el = document.getElementById('timer');
                if (el) el.textContent = fmt(recordingSeconds);
            }, 1000);

        } catch (err) {
            console.error('[Scriber] getUserMedia error:', err.name, err.message);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                errorMessage = 'Microphone access was denied. Please tap the lock icon in your browser\'s address bar, allow microphone access, then reload the page.';
            } else if (err.name === 'NotFoundError') {
                errorMessage = 'No microphone found on this device.';
            } else {
                errorMessage = `Could not start recording: ${err.message}`;
            }
            setState('ERROR');
        }
    }

    async function resumeRecording() {
        console.log('[Scriber] Resuming after interruption — re-acquiring microphone');

        // Record the wall-clock resume timestamp so the server can compute the exact
        // gap duration (interruption.at → interruption.resumedAt) for the gap marker.
        if (interruptions.length > 0) {
            interruptions[interruptions.length - 1].resumedAt = new Date().toISOString();
            console.log('[Scriber] Resume wall-clock recorded:', interruptions[interruptions.length - 1].resumedAt);
        }

        // Defensively clean up the old (interrupted / dead) stream. The onstop handler
        // already removed track listeners and stopped the tracks, but we null stream here
        // before calling getUserMedia to avoid any lingering reference.
        if (stream) {
            stream.getTracks().forEach(t => {
                t.removeEventListener('mute',   onTrackMute);
                t.removeEventListener('unmute', onTrackUnmute);
                t.removeEventListener('ended',  onTrackEnded);
                try { t.stop(); } catch(e) { /* already stopped */ }
            });
            stream = null;
        }

        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            console.log('[Scriber] Microphone re-acquired for resume');

            // Continue the timer from where it paused — recordingSeconds was not reset
            setupRecorder(stream, recordingSeconds);
            setState('RECORDING');

            timerInterval = setInterval(() => {
                recordingSeconds++;
                const el = document.getElementById('timer');
                if (el) el.textContent = fmt(recordingSeconds);
            }, 1000);

        } catch (err) {
            console.error('[Scriber] Failed to re-acquire mic:', err.name, err.message);
            errorMessage = `Could not re-acquire microphone: ${err.message}. Please check mic permissions and try again.`;
            setState('ERROR');
        }
    }

    function pauseRecording() {
        handleInterruption('manual-pause');
    }

    function stopRecording() {
        console.log('[Scriber] Stop button — recording duration:', fmt(recordingSeconds));
        clearInterval(timerInterval);
        timerInterval = null;
        cleanupPageListeners();
        setState('PROCESSING');
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
            // onstop will call sendAllSegments(1) since appState is now PROCESSING
        } else {
            // Recorder already stopped (rare edge case) — segments[] already has everything
            sendAllSegments(1);
        }
    }

    function finishAndUpload() {
        console.log('[Scriber] Finishing after interruption — uploading', segments.length, 'segment(s)');
        cleanupPageListeners();
        setState('PROCESSING');
        // Recorder was already stopped by handleInterruption; onstop already saved the last
        // segment, so send directly without stopping again.
        sendAllSegments(1);
    }

    // ─── Upload + retry ───────────────────────────────────────────────────────────

    async function sendAllSegments(attempt) {
        if (!segments.length) {
            errorMessage = 'No audio was captured. Please try recording again.';
            setState('ERROR');
            return;
        }

        console.log(`[Scriber] Upload attempt ${attempt} —`,
                    `segments: ${segments.length},`,
                    `interrupted: ${interruptions.length > 0},`,
                    `gaps: ${interruptions.length}`);
        segments.forEach(s => {
            console.log(`  segment_${s.index}: ${s.blob.size} bytes, mime: ${s.mimeType},`,
                        `range: ${s.startSecond}s–${s.endSecond}s`);
        });

        const formData = new FormData();
        formData.append('firstName',         firstName);
        formData.append('lastName',          lastName);
        formData.append('dateOfBirth',       dateOfBirth);
        formData.append('segmentCount',      String(segments.length));
        formData.append('interrupted',       interruptions.length > 0 ? 'true' : 'false');
        formData.append('interruptionCount', String(interruptions.length));
        formData.append('interruptions',     JSON.stringify(interruptions));

        // Per-segment metadata for the server (MIME type, timing)
        const segmentMeta = segments.map(s => ({
            index:       s.index,
            mimeType:    s.mimeType,
            startSecond: s.startSecond,
            endSecond:   s.endSecond,
        }));
        formData.append('segmentMeta', JSON.stringify(segmentMeta));

        // Each segment as its own multipart file — valid standalone audio container
        segments.forEach(s => {
            const ext = s.mimeType.includes('mp4') ? 'mp4'
                      : s.mimeType.includes('ogg') ? 'ogg'
                      : 'webm';
            formData.append(`segment_${s.index}`, s.blob, `segment-${s.index}.${ext}`);
        });

        try {
            const res = await fetch(`${BACKEND_URL}/upload`, {
                method: 'POST',
                body: formData,
            });

            console.log('[Scriber] HTTP status:', res.status);

            if (!res.ok) {
                const body = await res.text().catch(() => '');
                throw new Error(`Server returned ${res.status}${body ? ': ' + body : ''}`);
            }

            const data = await res.json();
            console.log('[Scriber] Success response:', data);

            segments = [];    // cleared on success; kept on failure for manual retry
            setState('SUCCESS');

        } catch (err) {
            console.error(`[Scriber] Attempt ${attempt} failed:`, err.message);

            const delays = [2000, 4000, 8000];

            if (attempt <= 3) {
                retryAttempt = attempt;
                setState('RETRYING');
                const delay = delays[attempt - 1];
                console.log(`[Scriber] Waiting ${delay / 1000}s before retry ${attempt}…`);
                await wait(delay);
                await sendAllSegments(attempt + 1);
            } else {
                console.error('[Scriber] All 3 retries exhausted.');
                errorMessage = 'Connection failed after 3 attempts. Please check your internet connection and tap Try Again when ready.';
                setState('ERROR');
            }
        }
    }

    async function retryUpload() {
        if (!segments.length) {
            errorMessage = 'Recording was lost — please record again.';
            setState('ERROR');
            return;
        }
        console.log('[Scriber] Manual retry — reusing', segments.length, 'segment(s)');
        setState('PROCESSING');
        await sendAllSegments(1);
    }

    function startNew() {
        console.log('[Scriber] Starting new session — clearing all state');
        cleanupPageListeners();
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
            mediaRecorder.stop();
        }
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
            stream = null;
        }
        mediaRecorder    = null;
        audioChunks      = [];
        segments         = [];
        interruptions    = [];
        interruptReason  = '';
        currentMimeType  = '';
        firstName        = '';
        lastName         = '';
        dateOfBirth      = '';
        recordingSeconds = 0;
        retryAttempt     = 0;
        errorMessage     = '';
        clearInterval(timerInterval);
        timerInterval    = null;
        setState('READY');
    }

    // Boot
    render();
</script>
</body>
</html>
